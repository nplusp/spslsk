services:
  slskd:
    image: slskd/slskd:latest
    container_name: slskd
    ports:
      - "5030:5030"
      - "50300:50300"
    environment:
      - SLSKD_SLSK_USERNAME=${SLSKD_SLSK_USERNAME}
      - SLSKD_SLSK_PASSWORD=${SLSKD_SLSK_PASSWORD}
      - SLSKD_REMOTE_CONFIGURATION=true
      - SLSKD_SHARED_DIR=/shared;/music
      # NOTE: the API key is NOT set here via env vars. slskd's .NET config
      # binder silently drops new Dictionary<string, T> entries passed via
      # SLSKD_WEB_AUTHENTICATION__API_KEYS__<NAME>__KEY etc., so backend
      # requests come back as "Unknown API key beginning with: ...". Instead,
      # start.sh writes the api_keys block into slskd-data/slskd.yml which
      # slskd loads reliably on startup.
    volumes:
      - ./slskd-data:/app
      - ./downloads:/app/downloads
      - ./shared:/shared
      - ${MUSIC_DIR:-./music}:/music
    restart: unless-stopped

  backend:
    build: .
    container_name: spotify-slsk-backend
    ports:
      - "8000:8000"
    environment:
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SLSKD_API_KEY=${SLSKD_API_KEY}
      - SLSKD_URL=http://slskd:5030
    volumes:
      - ./downloads:/app/downloads
      - ./app:/app/app
    depends_on:
      - slskd
    restart: unless-stopped
