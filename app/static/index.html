<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spslsk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { background: #0a0a0a; }
        .gradient-text {
            background: linear-gradient(135deg, #1DB954, #1ed760);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card {
            background: #141414;
            border: 1px solid #222;
        }
        .input-dark {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
        }
        .input-dark:focus {
            border-color: #1DB954;
            outline: none;
            box-shadow: 0 0 0 2px rgba(29, 185, 84, 0.2);
        }
        .btn-green {
            background: #1DB954;
            color: #000;
            font-weight: 600;
        }
        .btn-green:hover { background: #1ed760; }
        .btn-green:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-ghost {
            background: transparent;
            border: 1px solid #333;
            color: #ccc;
        }
        .btn-ghost:hover { border-color: #555; color: #fff; }
        .btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; display: inline-block;
        }
        .tab-active {
            color: #1DB954;
            border-bottom: 2px solid #1DB954;
        }
        .tab-inactive {
            color: #666;
            border-bottom: 2px solid transparent;
        }
        .tab-inactive:hover { color: #999; }
        /* Cells that look like static text but are actually inputs. */
        .cell-input {
            background: transparent;
            border: 1px solid transparent;
            border-radius: 4px;
            padding: 2px 6px;
            color: inherit;
            font: inherit;
            width: 100%;
            outline: none;
        }
        .cell-input:hover { border-color: #2a2a2a; }
        .cell-input:focus { border-color: #1DB954; background: #1a1a1a; }
        /* Source badges */
        .badge { font-size: 10px; padding: 1px 6px; border-radius: 9999px; }
        .badge-playlist { background: #1e3a8a; color: #93c5fd; }
        .badge-album { background: #581c87; color: #d8b4fe; }
        .badge-track { background: #064e3b; color: #6ee7b7; }
        .badge-text { background: #374151; color: #d1d5db; }
        /* Row states */
        .row-review { background: rgba(234, 179, 8, 0.08); }
        .row-review:hover { background: rgba(234, 179, 8, 0.14); }
        .row-done { opacity: 0.5; }
        .row-done:hover { opacity: 0.8; }
    </style>
</head>
<body class="text-white min-h-screen" x-data="app()" x-cloak>

    <!-- Top status bar during download -->
    <template x-if="downloading && status">
        <div class="fixed top-0 left-0 right-0 z-50">
            <div class="h-1 bg-gray-800">
                <div
                    class="h-1 bg-green-500 transition-all duration-1000"
                    :style="`width: ${((status.completed + status.not_found + status.errors) / status.total) * 100}%`"
                ></div>
            </div>
            <div class="bg-black/80 backdrop-blur-sm border-b border-gray-800 px-4 py-2">
                <div class="max-w-6xl mx-auto flex items-center gap-3 text-xs">
                    <span class="text-green-500 pulse">&#9679;</span>
                    <span class="text-gray-400 flex-1 truncate" x-text="currentDownloadingTrack"></span>
                    <span class="text-gray-500 whitespace-nowrap"
                          x-text="status.completed + '/' + status.total + ' done'"></span>
                    <span x-show="status.not_found > 0" class="text-yellow-500 whitespace-nowrap"
                          x-text="status.not_found + ' missed'"></span>
                </div>
            </div>
        </div>
    </template>

    <div class="max-w-6xl mx-auto px-4" :class="downloading && status ? 'pt-16' : 'pt-8'">
        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold mb-1">
                <span class="gradient-text">spslsk</span>
            </h1>
            <p class="text-gray-500 text-xs">Paste Spotify URLs or text tracklists &rarr; Soulseek</p>
        </div>

        <!-- Connection status -->
        <div class="flex items-center justify-center gap-2 mb-6 text-xs">
            <span class="status-dot" :class="slskdOk ? 'bg-green-500' : 'bg-red-500'"></span>
            <span class="text-gray-400" x-text="slskdOk ? 'slskd connected' : 'slskd not reachable'"></span>
        </div>

        <!-- Two-column layout -->
        <div class="flex gap-6">
            <!-- LEFT: Main content -->
            <div class="flex-1 min-w-0">
                <!-- Input textarea -->
                <div class="card rounded-xl p-5 mb-5">
                    <label class="block text-gray-400 text-xs mb-2">
                        Paste anything: Spotify playlist/album/track URLs, plain text lines, or a mix. One per line.
                    </label>
                    <textarea
                        x-model="inputText"
                        @input="onInputEdit"
                        rows="5"
                        placeholder="https://open.spotify.com/playlist/37i9dQZF1DXcBWIGoYBM5M&#10;Radiohead - Karma Police&#10;https://open.spotify.com/track/3WwnmMcnZueBYwnJ76QEli&#10;Miles Davis — So What&#10;https://open.spotify.com/album/1DFixLWuPkv3KT3TnV35m3"
                        class="input-dark w-full rounded-lg px-4 py-2.5 text-sm resize-y font-mono"
                        :disabled="downloading"
                    ></textarea>
                    <div class="flex items-center gap-3 mt-3">
                        <button
                            class="btn-green rounded-lg px-5 py-2 text-sm"
                            :disabled="loading || !inputText.trim() || downloading"
                            @click="parseInput"
                        >
                            <span x-show="!loading">Parse &amp; preview</span>
                            <span x-show="loading" class="pulse">Parsing...</span>
                        </button>
                        <p x-show="error" class="text-red-400 text-xs" x-text="error"></p>
                    </div>
                </div>

                <!-- Preview (after parse) -->
                <template x-if="parsed">
                    <div class="card rounded-xl p-5">
                        <!-- Name + thumbnail + action buttons -->
                        <div class="flex items-start gap-4 mb-4">
                            <img
                                x-show="parsed.suggested_image"
                                :src="parsed.suggested_image"
                                class="w-14 h-14 rounded-lg object-cover flex-shrink-0"
                            >
                            <div class="flex-1 min-w-0">
                                <label class="block text-gray-400 text-xs mb-1">List name</label>
                                <input
                                    type="text"
                                    x-model="listName"
                                    class="input-dark w-full rounded-lg px-3 py-1.5 text-sm"
                                    :disabled="downloading"
                                >
                                <p class="text-gray-500 text-xs mt-1">
                                    <span class="text-green-500" x-text="readyCount + ' ready'"></span>
                                    <template x-if="reviewCount > 0">
                                        <span class="text-yellow-500" x-text="' · ' + reviewCount + ' need review'"></span>
                                    </template>
                                    <template x-if="downloadedCount > 0">
                                        <span class="text-gray-600" x-text="' · ' + downloadedCount + ' already downloaded'"></span>
                                    </template>
                                </p>
                            </div>
                            <div class="flex flex-col items-end gap-2 flex-shrink-0">
                                <div class="flex gap-2" x-show="!downloading">
                                    <button
                                        class="btn-ghost rounded-lg px-3 py-1.5 text-xs"
                                        @click="swapAll"
                                        :disabled="!hasTextRows"
                                        title="Swap artist &harr; title for every text row"
                                    >&rlarr; Swap</button>
                                    <button
                                        class="btn-ghost rounded-lg px-3 py-1.5 text-xs"
                                        @click="addRow"
                                    >+ Add row</button>
                                </div>
                                <button
                                    x-show="!downloading"
                                    class="btn-green rounded-lg px-5 py-2 text-sm"
                                    :disabled="reviewCount > 0 || readyCount === 0"
                                    @click="startDownload"
                                    :title="reviewCount > 0 ? 'Fix or delete rows marked \u26a0 first' : ''"
                                >Start download</button>
                                <button
                                    x-show="downloading"
                                    class="rounded-lg px-5 py-2 text-sm bg-red-600 hover:bg-red-500 font-semibold"
                                    @click="stopDownload"
                                >Stop</button>
                            </div>
                        </div>

                        <!-- Progress bar during download -->
                        <template x-if="status && status.total > 0">
                            <div class="mb-3">
                                <div class="flex justify-between text-xs text-gray-500 mb-1">
                                    <span>
                                        <span x-text="status.completed"></span>/<span x-text="status.total"></span> done
                                    </span>
                                    <span x-show="status.not_found > 0" class="text-yellow-500">
                                        <span x-text="status.not_found"></span> not found
                                    </span>
                                </div>
                                <div class="w-full bg-gray-800 rounded-full h-1.5">
                                    <div
                                        class="bg-green-500 h-1.5 rounded-full transition-all duration-500"
                                        :style="`width: ${((status.completed + status.not_found + status.errors) / status.total) * 100}%`"
                                    ></div>
                                </div>
                            </div>
                        </template>

                        <!-- Track list -->
                        <div class="space-y-0.5 max-h-[calc(100vh-360px)] overflow-y-auto">
                            <template x-for="(track, idx) in displayTracks" :key="track._key || idx">
                                <div class="flex items-center gap-2 py-1 px-2 rounded-lg text-sm"
                                     :class="rowClass(track)">
                                    <!-- Status icon -->
                                    <div class="w-4 flex-shrink-0 text-center">
                                        <span class="text-xs" :class="iconClass(track)" x-text="iconChar(track)"></span>
                                    </div>
                                    <!-- Artist -->
                                    <div class="w-1/3 min-w-0">
                                        <input
                                            type="text"
                                            class="cell-input truncate"
                                            :value="track.artist"
                                            @change="updateCell(idx, 'artist', $event.target.value)"
                                            :disabled="downloading || track.source !== 'text'"
                                            placeholder="artist"
                                        >
                                    </div>
                                    <span class="text-gray-600 flex-shrink-0">&mdash;</span>
                                    <!-- Title -->
                                    <div class="flex-1 min-w-0">
                                        <input
                                            type="text"
                                            class="cell-input truncate"
                                            :value="track.title"
                                            @change="updateCell(idx, 'title', $event.target.value)"
                                            :disabled="downloading || track.source !== 'text'"
                                            placeholder="title"
                                        >
                                    </div>
                                    <!-- Source badge -->
                                    <span class="badge flex-shrink-0" :class="sourceClass(track)" x-text="track.source"></span>
                                    <!-- Quality pill during/after download -->
                                    <template x-if="track.quality">
                                        <span class="text-xs px-2 py-0.5 rounded-full flex-shrink-0"
                                              :class="track.quality.includes('lossless') ? 'bg-green-900 text-green-300' :
                                                      track.quality === 'already downloaded' ? 'bg-gray-700 text-gray-400' :
                                                      'bg-gray-700 text-gray-300'"
                                              x-text="track.quality"
                                        ></span>
                                    </template>
                                    <!-- Error tooltip for needs_review -->
                                    <template x-if="track.error && track.state === 'needs_review'">
                                        <span class="text-yellow-500 text-xs flex-shrink-0 truncate max-w-[200px]"
                                              :title="track.error" x-text="'⚠ ' + track.error"></span>
                                    </template>
                                    <!-- Delete -->
                                    <button
                                        x-show="!downloading"
                                        @click="deleteRow(idx)"
                                        class="text-gray-600 hover:text-red-500 flex-shrink-0 w-5 text-center"
                                        title="Remove this row"
                                    >&times;</button>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>

            <!-- RIGHT: Sidebar with tabs -->
            <div class="w-72 flex-shrink-0 hidden lg:block">
                <div class="card rounded-xl overflow-hidden sticky top-20">
                    <!-- Tabs -->
                    <div class="flex border-b border-gray-800">
                        <button
                            class="flex-1 py-2.5 text-xs font-medium text-center transition-colors"
                            :class="sidebarTab === 'history' ? 'tab-active' : 'tab-inactive'"
                            @click="sidebarTab = 'history'"
                        >
                            History
                            <span x-show="history.length > 0"
                                  class="ml-1 text-gray-600" x-text="'(' + history.length + ')'"></span>
                        </button>
                        <button
                            class="flex-1 py-2.5 text-xs font-medium text-center transition-colors"
                            :class="sidebarTab === 'files' ? 'tab-active' : 'tab-inactive'"
                            @click="sidebarTab = 'files'"
                        >
                            Files
                            <span x-show="downloadedFiles.length > 0"
                                  class="ml-1 text-gray-600" x-text="'(' + downloadedFiles.length + ')'"></span>
                        </button>
                    </div>

                    <!-- History tab -->
                    <div x-show="sidebarTab === 'history'" class="max-h-[calc(100vh-200px)] overflow-y-auto">
                        <template x-if="history.length === 0">
                            <p class="text-gray-600 text-xs p-4 text-center">No downloads yet</p>
                        </template>
                        <div class="divide-y divide-gray-800/50">
                            <template x-for="(item, idx) in history" :key="item.ts">
                                <div
                                    class="p-3 hover:bg-white/5 cursor-pointer transition-colors"
                                    @click="loadFromHistory(item)"
                                >
                                    <div class="flex items-center gap-2.5">
                                        <img
                                            x-show="item.image"
                                            :src="item.image"
                                            class="w-8 h-8 rounded object-cover flex-shrink-0"
                                        >
                                        <div class="min-w-0 flex-1">
                                            <p class="text-xs font-medium truncate" x-text="historyName(item)"></p>
                                            <p class="text-xs text-gray-600">
                                                <span x-text="historyTotal(item)"></span> tracks
                                                &middot; <span x-text="timeAgo(item.ts)"></span>
                                            </p>
                                        </div>
                                        <a href="#" @click.stop.prevent="openPlaylistFolder(historyName(item))"
                                           class="text-gray-600 hover:text-green-500 flex-shrink-0 p-1"
                                           title="Open folder">
                                            <span class="text-xs">&#128193;</span>
                                        </a>
                                    </div>
                                </div>
                            </template>
                        </div>
                        <template x-if="history.length > 0">
                            <div class="p-2 border-t border-gray-800">
                                <button
                                    @click="clearHistory"
                                    class="text-xs text-gray-600 hover:text-gray-400 w-full text-center py-1"
                                >Clear history</button>
                            </div>
                        </template>
                    </div>

                    <!-- Files tab -->
                    <div x-show="sidebarTab === 'files'" class="max-h-[calc(100vh-200px)] overflow-y-auto">
                        <template x-if="downloadedFiles.length > 0">
                            <div class="p-2 border-b border-gray-800">
                                <a href="#" @click.prevent="openDownloads"
                                   class="text-xs text-green-500 hover:text-green-400 flex items-center justify-center gap-1 py-1">
                                    <span>&#128193;</span>
                                    <span x-text="folderCopied ? 'Copied!' : 'Open folder'"></span>
                                </a>
                            </div>
                        </template>
                        <template x-if="downloadedFiles.length === 0">
                            <p class="text-gray-600 text-xs p-4 text-center">No files yet</p>
                        </template>
                        <div class="divide-y divide-gray-800/50">
                            <template x-for="file in downloadedFiles" :key="file.path">
                                <div class="flex items-center gap-2 py-1.5 px-3 text-xs text-gray-400">
                                    <span class="text-green-500">&#9835;</span>
                                    <span class="flex-1 truncate" x-text="file.name"></span>
                                    <span class="text-gray-600 flex-shrink-0" x-text="file.size_mb + 'MB'"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mobile: collapsible sections below (visible only on small screens) -->
        <div class="lg:hidden mt-6 space-y-4">
            <template x-if="history.length > 0">
                <details class="card rounded-xl">
                    <summary class="p-4 text-sm font-semibold text-gray-400 cursor-pointer">
                        Previous downloads (<span x-text="history.length"></span>)
                    </summary>
                    <div class="px-4 pb-4 space-y-2">
                        <template x-for="item in history" :key="item.ts">
                            <div
                                class="flex items-center gap-2 p-2 rounded-lg hover:bg-white/5 cursor-pointer"
                                @click="loadFromHistory(item)"
                            >
                                <img x-show="item.image" :src="item.image"
                                     class="w-8 h-8 rounded object-cover">
                                <div class="min-w-0">
                                    <p class="text-xs font-medium truncate" x-text="historyName(item)"></p>
                                    <p class="text-xs text-gray-600" x-text="historyTotal(item) + ' tracks'"></p>
                                </div>
                            </div>
                        </template>
                    </div>
                </details>
            </template>
            <template x-if="downloadedFiles.length > 0">
                <details class="card rounded-xl">
                    <summary class="p-4 text-sm font-semibold text-gray-400 cursor-pointer">
                        Downloaded Files (<span x-text="downloadedFiles.length"></span>)
                    </summary>
                    <div class="px-4 pb-4 space-y-1">
                        <template x-for="file in downloadedFiles" :key="file.path">
                            <div class="flex items-center gap-2 text-xs text-gray-400">
                                <span class="text-green-500">&#9835;</span>
                                <span class="truncate" x-text="file.name"></span>
                                <span class="text-gray-600 ml-auto" x-text="file.size_mb + 'MB'"></span>
                            </div>
                        </template>
                    </div>
                </details>
            </template>
        </div>
    </div>

    <script>
        // Monotonic key generator so x-for :key stays stable across edits.
        let _keyCounter = 0;
        function nextKey() { return ++_keyCounter; }

        function app() {
            return {
                // --- Input + preview state ---
                inputText: '',
                parsed: null,           // ParsedInput from /api/parse-input
                listName: '',           // editable name, pre-filled from parsed.suggested_name
                loading: false,
                error: '',

                // --- Download state ---
                downloading: false,
                status: null,
                slskdOk: false,
                pollInterval: null,
                downloadedFiles: [],
                folderCopied: false,

                // --- Sidebar state ---
                history: [],
                sidebarTab: 'history',

                // --- Derived counts ---
                get readyCount() {
                    if (!this.parsed) return 0;
                    return this.parsed.tracks.filter(t => t.state === 'ready').length;
                },
                get reviewCount() {
                    if (!this.parsed) return 0;
                    return this.parsed.tracks.filter(t => t.state === 'needs_review').length;
                },
                get downloadedCount() {
                    if (!this.parsed) return 0;
                    return this.parsed.tracks.filter(t => t.state === 'already_downloaded').length;
                },
                get hasTextRows() {
                    if (!this.parsed) return false;
                    return this.parsed.tracks.some(t => t.source === 'text');
                },

                // Display tracks: during download we overlay backend status onto
                // the parsed track list so user sees search/download progress per row.
                get displayTracks() {
                    if (!this.parsed) return [];
                    if (this.status && this.status.tracks && this.downloading) {
                        // Backend only processes ready tracks, so we need to align
                        // by walking parsed.tracks and pulling in backend status
                        // for each ready row.
                        let backendIdx = 0;
                        return this.parsed.tracks.map(t => {
                            if (t.state !== 'ready') return t;
                            const backend = this.status.tracks[backendIdx++];
                            if (!backend) return t;
                            return {
                                ...t,
                                _backendStatus: backend.status,
                                quality: backend.quality || t.quality,
                                filename: backend.filename,
                            };
                        });
                    }
                    return this.parsed.tracks;
                },

                get currentDownloadingTrack() {
                    if (!this.status || !this.status.tracks) return '';
                    const active = this.status.tracks.find(t =>
                        t.status === 'downloading' || t.status === 'searching'
                    );
                    if (active) {
                        const verb = active.status === 'searching' ? 'Searching' : 'Downloading';
                        return `${verb}: ${active.title} — ${active.artist}`;
                    }
                    return 'Processing...';
                },

                // --- Lifecycle ---
                async init() {
                    await this.checkHealth();
                    await this.loadFiles();
                    this.loadHistory();

                    // Restore in-progress session if any (e.g. user refreshed during download)
                    try {
                        const resp = await fetch('/api/status');
                        const st = await resp.json();
                        if (st.total > 0) {
                            this.status = st;
                            if (st.active) {
                                this.downloading = true;
                                this.startPolling();
                            }
                        }
                    } catch {}

                    if (this.downloadedFiles.length > 0 && this.history.length === 0) {
                        this.sidebarTab = 'files';
                    }
                },

                // --- History (localStorage) ---
                loadHistory() {
                    try {
                        this.history = JSON.parse(localStorage.getItem('spslsk_history') || '[]');
                    } catch { this.history = []; }
                },

                saveToHistory(entry) {
                    // entry: { rawText, name, image, total, ts }
                    this.history.unshift(entry);
                    if (this.history.length > 20) this.history = this.history.slice(0, 20);
                    localStorage.setItem('spslsk_history', JSON.stringify(this.history));
                },

                loadFromHistory(item) {
                    // New-schema entries carry rawText; old-schema entries only
                    // have the legacy {url, playlist} shape. Fall back to url for
                    // backward compatibility — a bare URL is valid parser input.
                    if (item.rawText !== undefined) {
                        this.inputText = item.rawText;
                    } else if (item.url) {
                        this.inputText = item.url;
                    } else if (item.playlist && item.playlist.url) {
                        this.inputText = item.playlist.url;
                    }
                    this.parsed = null;
                    this.error = '';
                    this.status = null;
                    // Scroll to top so the user sees the restored textarea.
                    window.scrollTo({top: 0, behavior: 'smooth'});
                },

                historyName(item) {
                    if (item.name) return item.name;
                    if (item.playlist && item.playlist.name) return item.playlist.name;
                    return 'Untitled';
                },

                historyTotal(item) {
                    if (typeof item.total === 'number') return item.total;
                    if (item.playlist && typeof item.playlist.total === 'number') return item.playlist.total;
                    return 0;
                },

                clearHistory() {
                    this.history = [];
                    localStorage.removeItem('spslsk_history');
                },

                timeAgo(ts) {
                    const diff = Date.now() - ts;
                    const mins = Math.floor(diff / 60000);
                    if (mins < 1) return 'just now';
                    if (mins < 60) return mins + 'm ago';
                    const hours = Math.floor(mins / 60);
                    if (hours < 24) return hours + 'h ago';
                    const days = Math.floor(hours / 24);
                    return days + 'd ago';
                },

                // --- Health / files ---
                async loadFiles() {
                    try {
                        const resp = await fetch('/api/files');
                        const data = await resp.json();
                        this.downloadedFiles = data.files || [];
                    } catch {}
                },

                async checkHealth() {
                    try {
                        const resp = await fetch('/api/health');
                        const data = await resp.json();
                        this.slskdOk = data.slskd;
                    } catch {
                        this.slskdOk = false;
                    }
                },

                // --- Parse & preview ---
                onInputEdit() {
                    // Editing the textarea after parse invalidates the preview so
                    // the user cannot accidentally download stale tracks.
                    if (this.parsed && !this.downloading) {
                        this.parsed = null;
                        this.status = null;
                    }
                },

                async parseInput() {
                    if (!this.inputText.trim() || this.downloading) return;
                    this.loading = true;
                    this.error = '';
                    this.parsed = null;
                    try {
                        const resp = await fetch('/api/parse-input', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({text: this.inputText}),
                        });
                        if (!resp.ok) {
                            const err = await resp.json().catch(() => ({}));
                            throw new Error(err.detail || 'Failed to parse input');
                        }
                        const data = await resp.json();
                        // Tag each track with a stable client-side key for x-for
                        data.tracks.forEach(t => { t._key = nextKey(); });
                        this.parsed = data;
                        this.listName = data.suggested_name || '';
                    } catch (e) {
                        this.error = e.message;
                    } finally {
                        this.loading = false;
                    }
                },

                // --- Preview editing ---
                updateCell(idx, field, value) {
                    const track = this.parsed.tracks[idx];
                    if (!track || track.source !== 'text') return;
                    track[field] = value.trim();
                    // Editing an existing row breaks manifest dedup identity.
                    // Clearing the id makes the backend treat this as a new
                    // track and skip manifest lookup. Acceptable: edits are
                    // rare and the user explicitly changed the content.
                    track.id = '';
                    if (track.artist && track.title) {
                        track.state = 'ready';
                        track.error = null;
                    } else {
                        track.state = 'needs_review';
                        track.error = 'Missing artist or title';
                    }
                },

                swapAll() {
                    if (!this.parsed) return;
                    this.parsed.tracks.forEach(t => {
                        if (t.source !== 'text') return;
                        const a = t.artist;
                        t.artist = t.title;
                        t.title = a;
                        t.id = '';
                        if (t.artist && t.title) {
                            t.state = 'ready';
                            t.error = null;
                        }
                    });
                },

                addRow() {
                    if (!this.parsed) return;
                    this.parsed.tracks.push({
                        id: '',
                        artist: '',
                        title: '',
                        album: '',
                        duration_ms: 0,
                        source: 'text',
                        state: 'needs_review',
                        error: 'Fill in artist and title',
                        raw_line: '',
                        _key: nextKey(),
                    });
                },

                deleteRow(idx) {
                    if (!this.parsed) return;
                    this.parsed.tracks.splice(idx, 1);
                },

                // --- Row display helpers ---
                iconChar(track) {
                    if (track._backendStatus) {
                        const map = {
                            pending: '●', searching: '⌛', downloading: '↓',
                            completed: '✓', not_found: '?', error: '!',
                        };
                        return map[track._backendStatus] || '●';
                    }
                    if (track.state === 'ready') return '●';
                    if (track.state === 'already_downloaded') return '⏭';
                    if (track.state === 'needs_review') return '⚠';
                    return '●';
                },
                iconClass(track) {
                    if (track._backendStatus === 'completed') return 'text-green-500';
                    if (track._backendStatus === 'searching' || track._backendStatus === 'downloading') return 'text-blue-400 pulse';
                    if (track._backendStatus === 'not_found') return 'text-yellow-500';
                    if (track._backendStatus === 'error') return 'text-red-500';
                    if (track.state === 'ready') return 'text-gray-500';
                    if (track.state === 'already_downloaded') return 'text-gray-600';
                    if (track.state === 'needs_review') return 'text-yellow-500';
                    return 'text-gray-500';
                },
                rowClass(track) {
                    if (track.state === 'needs_review') return 'row-review';
                    if (track.state === 'already_downloaded') return 'row-done';
                    return 'hover:bg-white/5';
                },
                sourceClass(track) {
                    return {
                        'playlist': 'badge-playlist',
                        'album': 'badge-album',
                        'track': 'badge-track',
                        'text': 'badge-text',
                    }[track.source] || 'badge-text';
                },

                // --- Start / stop download ---
                async startDownload() {
                    if (!this.parsed || this.reviewCount > 0 || this.readyCount === 0) return;
                    this.downloading = true;
                    this.error = '';
                    try {
                        const resp = await fetch('/api/download', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                tracks: this.parsed.tracks,
                                name: this.listName || 'Untitled',
                                raw_text: this.inputText,
                            }),
                        });
                        if (!resp.ok) {
                            const err = await resp.json().catch(() => ({}));
                            throw new Error(err.detail || 'Failed to start download');
                        }
                        // Record in history with the new schema.
                        this.saveToHistory({
                            rawText: this.inputText,
                            name: this.listName || 'Untitled',
                            image: this.parsed.suggested_image || null,
                            total: this.readyCount,
                            ts: Date.now(),
                        });
                        this.startPolling();
                    } catch (e) {
                        this.error = e.message;
                        this.downloading = false;
                    }
                },

                async stopDownload() {
                    await fetch('/api/stop', {method: 'POST'});
                    this.downloading = false;
                    this.stopPolling();
                    this.updateTitle();
                },

                updateTitle() {
                    if (this.downloading && this.status) {
                        const active = this.status.tracks?.find(t =>
                            t.status === 'downloading' || t.status === 'searching'
                        );
                        const name = active ? `${active.artist} – ${active.title}` : '...';
                        document.title = `(${this.status.completed}/${this.status.total}) ${name}`;
                    } else {
                        document.title = 'spslsk';
                    }
                },

                startPolling() {
                    let fileRefreshCounter = 0;
                    this.pollInterval = setInterval(async () => {
                        try {
                            const resp = await fetch('/api/status');
                            this.status = await resp.json();
                            this.updateTitle();

                            fileRefreshCounter++;
                            if (fileRefreshCounter >= 7) {
                                fileRefreshCounter = 0;
                                await this.loadFiles();
                            }

                            if (!this.status.active) {
                                this.downloading = false;
                                this.stopPolling();
                                this.updateTitle();
                                await this.loadFiles();
                                if (this.downloadedFiles.length > 0) {
                                    this.sidebarTab = 'files';
                                }
                            }
                        } catch {}
                    }, 1500);
                },

                stopPolling() {
                    if (this.pollInterval) {
                        clearInterval(this.pollInterval);
                        this.pollInterval = null;
                    }
                },

                async openDownloads() {
                    try {
                        await fetch('http://localhost:8001/open-folder', {method: 'POST'});
                    } catch {
                        navigator.clipboard.writeText('open ./downloads/').then(() => {
                            this.folderCopied = true;
                            setTimeout(() => this.folderCopied = false, 2000);
                        });
                    }
                },

                async openPlaylistFolder(name) {
                    try {
                        await fetch('http://localhost:8001/open-folder', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({subfolder: name}),
                        });
                    } catch {}
                },
            };
        }
    </script>
</body>
</html>
