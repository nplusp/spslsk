<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotaSlsk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { background: #0a0a0a; }
        .gradient-text {
            background: linear-gradient(135deg, #1DB954, #1ed760);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card {
            background: #141414;
            border: 1px solid #222;
        }
        .input-dark {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
        }
        .input-dark:focus {
            border-color: #1DB954;
            outline: none;
            box-shadow: 0 0 0 2px rgba(29, 185, 84, 0.2);
        }
        .btn-green {
            background: #1DB954;
            color: #000;
            font-weight: 600;
        }
        .btn-green:hover { background: #1ed760; }
        .btn-green:disabled { opacity: 0.4; cursor: not-allowed; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; display: inline-block;
        }
        .collapse-transition {
            transition: max-height 0.3s ease, opacity 0.3s ease;
            overflow: hidden;
        }
    </style>
</head>
<body class="text-white min-h-screen" x-data="app()" x-cloak>

    <div class="max-w-2xl mx-auto px-4 py-12">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold mb-2">
                <span class="gradient-text">SpotaSlsk</span>
            </h1>
            <p class="text-gray-500 text-sm">Spotify playlist &rarr; Soulseek download</p>
        </div>

        <!-- Connection status -->
        <div class="flex items-center justify-center gap-2 mb-8 text-sm">
            <span class="status-dot" :class="slskdOk ? 'bg-green-500' : 'bg-red-500'"></span>
            <span class="text-gray-400" x-text="slskdOk ? 'slskd connected' : 'slskd not reachable'"></span>
        </div>

        <!-- Input -->
        <div class="card rounded-xl p-6 mb-6">
            <label class="block text-gray-400 text-sm mb-2">Spotify Playlist URL</label>
            <div class="flex gap-3">
                <input
                    type="text"
                    x-model="playlistUrl"
                    placeholder="https://open.spotify.com/playlist/..."
                    class="input-dark flex-1 rounded-lg px-4 py-3 text-sm"
                    @keydown.enter="fetchPlaylist"
                >
                <button
                    class="btn-green rounded-lg px-6 py-3 text-sm"
                    :disabled="loading || !playlistUrl"
                    @click="fetchPlaylist"
                >
                    <span x-show="!loading">Load</span>
                    <span x-show="loading" class="pulse">...</span>
                </button>
            </div>
            <p x-show="error" class="text-red-400 text-sm mt-2" x-text="error"></p>
        </div>

        <!-- Current playlist -->
        <template x-if="playlist">
            <div class="card rounded-xl p-6 mb-6">
                <div class="flex items-center gap-4 mb-4">
                    <img
                        x-show="playlist.image"
                        :src="playlist.image"
                        class="w-16 h-16 rounded-lg object-cover"
                    >
                    <div>
                        <h2 class="text-lg font-semibold" x-text="playlist.name"></h2>
                        <p class="text-gray-500 text-sm">
                            <span x-text="playlist.total"></span> tracks
                            <template x-if="currentDownloadedCount > 0">
                                <span class="text-green-500">
                                    &middot; <span x-text="currentDownloadedCount"></span> downloaded
                                </span>
                            </template>
                        </p>
                    </div>
                    <div class="ml-auto">
                        <button
                            x-show="!downloading"
                            class="btn-green rounded-lg px-6 py-2 text-sm"
                            @click="startDownload"
                        >
                            Download All
                        </button>
                        <button
                            x-show="downloading"
                            class="rounded-lg px-6 py-2 text-sm bg-red-600 hover:bg-red-500 font-semibold"
                            @click="stopDownload"
                        >
                            Stop
                        </button>
                    </div>
                </div>

                <!-- Progress bar -->
                <template x-if="status && status.total > 0">
                    <div class="mb-4">
                        <div class="flex justify-between text-xs text-gray-500 mb-1">
                            <span>
                                <span x-text="status.completed"></span>/<span x-text="status.total"></span> done
                            </span>
                            <span x-show="status.not_found > 0" class="text-yellow-500">
                                <span x-text="status.not_found"></span> not found
                            </span>
                        </div>
                        <div class="w-full bg-gray-800 rounded-full h-1.5">
                            <div
                                class="bg-green-500 h-1.5 rounded-full transition-all duration-500"
                                :style="`width: ${((status.completed + status.not_found + status.errors) / status.total) * 100}%`"
                            ></div>
                        </div>
                    </div>
                </template>

                <!-- Track list -->
                <div class="space-y-1 max-h-96 overflow-y-auto">
                    <template x-for="(track, idx) in displayTracks" :key="idx">
                        <div class="flex items-center gap-3 py-2 px-3 rounded-lg hover:bg-white/5 text-sm">
                            <!-- Status icon -->
                            <div class="w-5 flex-shrink-0 text-center">
                                <template x-if="track.status === 'pending'">
                                    <span class="text-gray-600">&#9679;</span>
                                </template>
                                <template x-if="track.status === 'searching'">
                                    <span class="text-yellow-400 pulse">&#8987;</span>
                                </template>
                                <template x-if="track.status === 'downloading'">
                                    <span class="text-blue-400 pulse">&darr;</span>
                                </template>
                                <template x-if="track.status === 'completed'">
                                    <span class="text-green-500">&#10003;</span>
                                </template>
                                <template x-if="track.status === 'not_found'">
                                    <span class="text-yellow-500">?</span>
                                </template>
                                <template x-if="track.status === 'error'">
                                    <span class="text-red-500">!</span>
                                </template>
                            </div>

                            <!-- Track info -->
                            <div class="flex-1 min-w-0">
                                <div class="truncate">
                                    <span class="text-white" x-text="track.title"></span>
                                    <span class="text-gray-500"> &mdash; </span>
                                    <span class="text-gray-400" x-text="track.artist"></span>
                                </div>
                            </div>

                            <!-- Quality badge -->
                            <div x-show="track.quality" class="flex-shrink-0">
                                <span
                                    class="text-xs px-2 py-0.5 rounded-full"
                                    :class="track.quality.includes('lossless') ? 'bg-green-900 text-green-300' :
                                            track.quality === 'already downloaded' ? 'bg-gray-700 text-gray-400' :
                                            'bg-gray-700 text-gray-300'"
                                    x-text="track.quality"
                                ></span>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- Playlist history -->
        <template x-if="history.length > 0">
            <div class="mb-6">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="text-sm font-semibold text-gray-400">Previous Playlists</h3>
                    <button
                        @click="clearHistory"
                        class="text-xs text-gray-600 hover:text-gray-400"
                    >Clear</button>
                </div>
                <div class="space-y-2">
                    <template x-for="(item, idx) in history" :key="item.url">
                        <div class="card rounded-xl overflow-hidden">
                            <!-- Collapsed header (always visible) -->
                            <div
                                class="flex items-center gap-3 p-4 cursor-pointer hover:bg-white/5"
                                @click="toggleHistory(idx)"
                            >
                                <img
                                    x-show="item.playlist.image"
                                    :src="item.playlist.image"
                                    class="w-10 h-10 rounded object-cover"
                                >
                                <div class="flex-1 min-w-0">
                                    <p class="text-sm font-medium truncate" x-text="item.playlist.name"></p>
                                    <p class="text-xs text-gray-500">
                                        <span x-text="item.playlist.total"></span> tracks
                                        &middot;
                                        <span x-text="timeAgo(item.ts)"></span>
                                    </p>
                                </div>
                                <div class="flex items-center gap-2">
                                    <button
                                        @click.stop="loadFromHistory(item)"
                                        class="text-xs text-green-500 hover:text-green-400 px-2 py-1"
                                    >Load</button>
                                    <span
                                        class="text-gray-500 text-xs transition-transform"
                                        :class="expandedHistory === idx ? 'rotate-180' : ''"
                                    >&#9660;</span>
                                </div>
                            </div>

                            <!-- Expanded track list -->
                            <div
                                x-show="expandedHistory === idx"
                                x-transition
                                class="border-t border-gray-800 px-4 pb-3"
                            >
                                <div class="space-y-0.5 max-h-48 overflow-y-auto pt-2">
                                    <template x-for="track in item.playlist.tracks" :key="track.id || track.title">
                                        <div class="flex items-center gap-2 py-1 text-xs text-gray-400">
                                            <span class="text-gray-600">&#9835;</span>
                                            <span class="truncate" x-text="track.title + ' — ' + track.artist"></span>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- Downloaded files -->
        <template x-if="downloadedFiles.length > 0">
            <div class="card rounded-xl p-6 mb-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-sm font-semibold text-gray-400">Downloaded Files</h3>
                    <div class="flex items-center gap-3">
                        <span class="text-xs text-gray-500" x-text="downloadedFiles.length + ' files'"></span>
                        <a href="#" @click.prevent="openDownloads"
                           class="text-xs text-green-500 hover:text-green-400 flex items-center gap-1">
                            <span>&#128193;</span>
                            <span x-text="folderCopied ? 'Copied! Paste in terminal' : 'Open folder'"></span>
                        </a>
                    </div>
                </div>
                <div class="space-y-1 max-h-48 overflow-y-auto">
                    <template x-for="file in downloadedFiles" :key="file.path">
                        <div class="flex items-center gap-3 py-1.5 px-3 text-sm text-gray-300">
                            <span class="text-green-500 text-xs">&#9835;</span>
                            <span class="flex-1 truncate" x-text="file.name"></span>
                            <span class="text-gray-600 text-xs" x-text="file.size_mb + ' MB'"></span>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>

    <script>
        function app() {
            return {
                playlistUrl: '',
                playlist: null,
                loading: false,
                error: '',
                downloading: false,
                status: null,
                slskdOk: false,
                pollInterval: null,
                downloadedFiles: [],
                folderCopied: false,
                history: [],
                expandedHistory: null,

                // Map of track_id -> {filename, quality} for already downloaded tracks
                downloadedMap: {},

                get displayTracks() {
                    if (this.status && this.status.tracks) {
                        return this.status.tracks;
                    }
                    if (this.playlist) {
                        return this.playlist.tracks.map(t => {
                            const dl = this.downloadedMap[t.id];
                            if (dl) {
                                return {...t, status: 'completed', quality: 'already downloaded', filename: dl.filename};
                            }
                            return {...t, status: 'pending', quality: ''};
                        });
                    }
                    return [];
                },

                get currentDownloadedCount() {
                    if (!this.playlist) return 0;
                    return this.playlist.tracks.filter(t => this.downloadedMap[t.id]).length;
                },

                async init() {
                    await this.checkHealth();
                    await this.loadFiles();
                    this.loadHistory();

                    // Restore last playlist from localStorage
                    const cached = localStorage.getItem('spotaslsk_last');
                    if (cached) {
                        try {
                            const data = JSON.parse(cached);
                            this.playlistUrl = data.url || '';
                            this.playlist = data.playlist || null;
                            if (this.playlist) await this.checkDownloaded();
                        } catch {}
                    }

                    // Check if there's an active download session
                    try {
                        const resp = await fetch('/api/status');
                        const st = await resp.json();
                        if (st.total > 0) {
                            this.status = st;
                            if (st.active) {
                                this.downloading = true;
                                this.startPolling();
                            }
                        }
                    } catch {}
                },

                // --- History management ---

                loadHistory() {
                    try {
                        this.history = JSON.parse(localStorage.getItem('spotaslsk_history') || '[]');
                    } catch { this.history = []; }
                },

                saveToHistory(url, playlist) {
                    // Remove duplicate if exists
                    this.history = this.history.filter(h => h.url !== url);
                    // Add to front (most recent first), keep max 20
                    this.history.unshift({ url, playlist, ts: Date.now() });
                    if (this.history.length > 20) this.history = this.history.slice(0, 20);
                    localStorage.setItem('spotaslsk_history', JSON.stringify(this.history));
                },

                toggleHistory(idx) {
                    this.expandedHistory = this.expandedHistory === idx ? null : idx;
                },

                loadFromHistory(item) {
                    this.playlistUrl = item.url;
                    this.playlist = item.playlist;
                    this.status = null;
                    // Save as current
                    localStorage.setItem('spotaslsk_last', JSON.stringify({
                        url: item.url,
                        playlist: item.playlist,
                        ts: Date.now(),
                    }));
                    this.checkDownloaded();
                },

                clearHistory() {
                    this.history = [];
                    localStorage.removeItem('spotaslsk_history');
                },

                timeAgo(ts) {
                    const diff = Date.now() - ts;
                    const mins = Math.floor(diff / 60000);
                    if (mins < 1) return 'just now';
                    if (mins < 60) return mins + 'm ago';
                    const hours = Math.floor(mins / 60);
                    if (hours < 24) return hours + 'h ago';
                    const days = Math.floor(hours / 24);
                    return days + 'd ago';
                },

                // --- Core functionality ---

                async checkDownloaded() {
                    if (!this.playlist || !this.playlist.tracks) return;
                    try {
                        const ids = this.playlist.tracks.map(t => t.id).filter(Boolean);
                        const resp = await fetch('/api/check-downloaded', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({track_ids: ids}),
                        });
                        const data = await resp.json();
                        this.downloadedMap = data.downloaded || {};
                    } catch {}
                },

                async loadFiles() {
                    try {
                        const resp = await fetch('/api/files');
                        const data = await resp.json();
                        this.downloadedFiles = data.files || [];
                    } catch {}
                },

                async checkHealth() {
                    try {
                        const resp = await fetch('/api/health');
                        const data = await resp.json();
                        this.slskdOk = data.slskd;
                    } catch {
                        this.slskdOk = false;
                    }
                },

                async fetchPlaylist() {
                    if (!this.playlistUrl) return;

                    // Warn if download is active
                    if (this.downloading) {
                        if (!confirm('Download is in progress. Stop it and load new playlist?')) {
                            return;
                        }
                        await this.stopDownload();
                    }

                    this.loading = true;
                    this.error = '';
                    this.status = null;

                    // Save current playlist to history before loading new one
                    if (this.playlist && this.playlistUrl) {
                        const currentUrl = localStorage.getItem('spotaslsk_last');
                        if (currentUrl) {
                            try {
                                const prev = JSON.parse(currentUrl);
                                if (prev.playlist && prev.url !== this.playlistUrl) {
                                    this.saveToHistory(prev.url, prev.playlist);
                                }
                            } catch {}
                        }
                    }

                    this.playlist = null;

                    try {
                        const resp = await fetch('/api/playlist', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({url: this.playlistUrl}),
                        });
                        if (!resp.ok) {
                            const err = await resp.json();
                            throw new Error(err.detail || 'Failed to load playlist');
                        }
                        this.playlist = await resp.json();
                        // Cache in localStorage
                        localStorage.setItem('spotaslsk_last', JSON.stringify({
                            url: this.playlistUrl,
                            playlist: this.playlist,
                            ts: Date.now(),
                        }));
                        // Also save to history
                        this.saveToHistory(this.playlistUrl, this.playlist);
                        await this.checkDownloaded();
                    } catch (e) {
                        this.error = e.message;
                    } finally {
                        this.loading = false;
                    }
                },

                async startDownload() {
                    this.downloading = true;
                    try {
                        await fetch('/api/download', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({url: this.playlistUrl}),
                        });
                        this.startPolling();
                    } catch (e) {
                        this.error = e.message;
                        this.downloading = false;
                    }
                },

                async stopDownload() {
                    await fetch('/api/stop', {method: 'POST'});
                    this.downloading = false;
                    this.stopPolling();
                },

                startPolling() {
                    let fileRefreshCounter = 0;
                    this.pollInterval = setInterval(async () => {
                        try {
                            const resp = await fetch('/api/status');
                            this.status = await resp.json();

                            // Refresh file list every ~10 seconds during download
                            fileRefreshCounter++;
                            if (fileRefreshCounter >= 7) {
                                fileRefreshCounter = 0;
                                await this.loadFiles();
                            }

                            if (!this.status.active) {
                                this.downloading = false;
                                this.stopPolling();
                                await this.loadFiles();
                            }
                        } catch {}
                    }, 1500);
                },

                stopPolling() {
                    if (this.pollInterval) {
                        clearInterval(this.pollInterval);
                        this.pollInterval = null;
                    }
                },

                async openDownloads() {
                    try {
                        // Call host-side helper to open Finder natively
                        await fetch('http://localhost:8001/open-folder', {method: 'POST'});
                    } catch {
                        // Fallback: copy command to clipboard
                        navigator.clipboard.writeText('open ./downloads/').then(() => {
                            this.folderCopied = true;
                            setTimeout(() => this.folderCopied = false, 2000);
                        });
                    }
                },
            };
        }
    </script>
</body>
</html>
